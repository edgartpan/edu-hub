<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Hub - Juegos Educativos</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F5F5;
            --card-bg: #FFFFFF;
            --math: #FF2977;
            --geo: #26C5AE;
            --text: #111827;
            --border: #000000;
            --shadow: #000000;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            margin: 0;
            background-color: var(--card-bg);
            border: 4px solid var(--border);
            display: inline-block;
            padding: 10px 30px;
            border-radius: 15px;
            box-shadow: 6px 6px 0px var(--shadow);
        }
        .header p {
            font-size: 1.2rem;
            color: #111;
            margin-top: 20px;
            font-weight: 700;
            background-color: #F5F5F5;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 10px;
            border: 2px solid var(--border);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }
        @media (min-width: 600px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        .card {
            background: var(--card-bg);
            border: 4px solid var(--border);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            box-shadow: 8px 8px 0px var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--shadow);
        }
        .card:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--shadow);
        }
        .card h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            margin: 10px 0;
        }
        .card p {
            margin: 0;
            color: #4B5563;
            font-weight: 500;
        }
        .card.math h2 {
            color: var(--math);
        }
        .card.geo h2 {
            color: var(--geo);
        }
        .donation-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #FFF200;
            color: black;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            font-size: 14px;
            border-top: 3px solid black;
            z-index: 1000;
            box-sizing: border-box;
        }
        .donation-banner a {
            color: #FF2977;
            text-decoration: none;
            background-color: white;
            padding: 2px 8px;
            border: 2px solid black;
            border-radius: 5px;
            margin-left: 5px;
            transition: all 0.2s;
        }
        .donation-banner a:hover {
            background-color: #FF2977;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Edu <span style="color: #6358FF;">Hub</span></h1>
        <br>
        <p>Selecciona el área que deseas aprender hoy</p>
    </div>

    <div class="grid">
        <a href="./math-games-hub/index.html" class="card math">
            <h2>Math Hub</h2>
            <p>Aritmética, lógica, fracciones y geometría.</p>
        </a>

        <a href="./geography-games/dist/index.html" class="card geo">
            <h2>Geography Hub</h2>
            <p>Países, capitales, continentes y mapas.</p>
        </a>
    </div>
</div>

<div class="donation-banner">
    Si esta aplicación te resultó útil, puedes <a href="https://paypal.me/edgartpan?country.x=MX&locale.x=es_XC" target="_blank" rel="noreferrer">donar aquí</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Data Detective</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/css/global.css" />
    <link rel="stylesheet" href="style.css" />
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="../../shared/js/firebase-config.js"></script>
    
    <script src="script.js" defer></script>
  </head>

  <body>
    <div id="container">
      <!-- Top Banner -->
      <div class="top-banner">
          <a href="../../index.html">&lt; Volver a inicio</a>
          <button style="visibility: hidden;">⚙️ Ajustes</button>
      </div>

      <!-- Score Banner -->
      <div class="indicators" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; align-items: center; padding: 10px;">
          <span>Racha: <span id="racha_ui" style="color: #58FFC2;">0</span></span>
          <span>Score: <span id="score_ui" style="color: #FFDD01;">0</span></span>
          <span>Récord: <span id="highscore_ui" style="color: #FF2977;">0</span></span>
          <button onclick="showLeaderboard()" class="button-3d" style="font-size: 14px; padding: 5px 15px; margin: 0; box-shadow: 2px 2px 0 #000;">🏆 Top 10</button>
      </div>
      
      <div id="questionContainer" style="text-align:center; padding-top: 20px; min-height: 250px;">
        <p id="questionText" class="text" style="font-size: 24px; margin-bottom: 10px;">Calcula el valor faltante</p>
        <div id="svgContainer" style="width: 100%; max-width: 300px; height: 200px; margin: 0 auto; display: flex; align-items: center; justify-content: center;">
            <!-- SVG injected here -->
        </div>
      </div>
      <br>
      
      <div style="text-align:center;">
        <button id="btnopcion1" onclick="checkAnswer(1)" class="button-3d btn-opcion"></button>
        <button id="btnopcion2" onclick="checkAnswer(2)" class="button-3d btn-opcion"></button>
        <button id="btnopcion3" onclick="checkAnswer(3)" class="button-3d btn-opcion"></button>
      </div>
      <br>
      
      <div>
        <img id="img" class="image" src="../sumas/gifs/neutral.gif" alt="Feedback">
      </div>
      <div id="retro" class="text-retro">&nbsp;</div>
      
      <div style="text-align: center; margin-top: 10px; margin-bottom: 30px;">
        <button id="level_ready" class="button-3d btn-ready">Generar</button>
        <button onclick="terminarJuego()" class="button-3d" style="background-color: #FF2977; color: white;">Terminar</button>
      </div>

      <div class="donation-banner">
          Si esta aplicación te resultó útil, puedes <a href="https://paypal.me/edgartpan?country.x=MX&locale.x=es_XC" target="_blank">donar aquí</a>
      </div>

      <!-- High Score Modal -->
      <div id="highScoreOverlay"></div>
      <div id="highScorePanel">
          <button onclick="cancelHighScore()" class="close-btn">&#x2715;</button>
          <div class="title" style="text-align:center; font-weight:bold; font-size:22px; margin-bottom: 20px;">¡Nuevo Récord!</div>
          <div style="font-size: 16px; margin-bottom: 10px;">Ingresa tu nombre:</div>
          <input type="text" id="initialsInput" class="name-input" maxlength="15" autocomplete="off" placeholder="Tu nombre...">
          <button onclick="submitHighScore()" class="button-3d" style="width: auto; padding: 10px 40px; margin-top: 10px;">Guardar</button>
      </div>

      <!-- Leaderboard Modal -->
      <div id="leaderboardOverlay"></div>
      <div id="leaderboardPanel">
          <button onclick="hideLeaderboard()" class="close-btn">&#x2715;</button>
          <div class="title" style="text-align:center; font-weight:bold; font-size:22px; margin-bottom: 20px;">Mejores Puntuaciones</div>
          <div id="leaderboardContent">Cargando...</div>
      </div>

    </div>
  </body>
</html>

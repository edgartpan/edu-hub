<!DOCTYPE html>
<html>
<head>
    <title>Cálculo mental</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="../../shared/js/firebase-config.js"></script>
</head>
<body>
    <div id="container">
        <!-- Top Banner -->
        <div class="top-banner">
            <a href="../../index.html">&lt; Volver a inicio</a>
            <button onclick="toggleSettings()">⚙️ Ajustes</button>
        </div>

        <!-- Score Banner -->
        <!-- Score Banner -->
        <div class="indicators" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; align-items: center; padding: 10px;">
            <span>Racha: <span id="racha_ui" style="color: #58FFC2;">0</span></span>
            <span>Score: <span id="score_ui" style="color: #FFDD01;">0</span></span>
            <span>Récord: <span id="highscore_ui" style="color: #FF2977;">0</span></span>
            <button onclick="showLeaderboard()" class="button-3d" style="font-size: 14px; padding: 5px 15px; margin: 0; width: auto; box-shadow: 2px 2px 0 #000;">🏆 Top 10</button>
            <div style="width: 100%; font-size: 14px; color: #aaa; margin-top: 5px;">
                Frecuencia: <span id="velocidad">0.5</span> s&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;Secuencia: <span id="valores">4</span> núm
            </div>
        </div>

        <!-- Numbers Display -->
        <div id="sub-container">
            <span id="cifras" class="numeros">&nbsp;</span>
            <div id="answerContainer" style="display: none;">
                <input type="number" id="userAnswer">
                <button onclick="validarRespuesta()" class="button-3d" id="validarButton">✅ Validar</button>
                <div class="retro" id="retro"></div>
            </div>
            <span class="retro" id="resultado"></span>
        </div>

        <!-- Control Buttons -->
        <div id="controls">
            <div class="subcontrols">
                <button onclick="reDisplay()" class="button-3d" id="repeatButton" style="display: none;">🔁 Repetir</button>
                <button onclick="verResultado()" class="button-3d" id="showResultButton" style="display: none;">👀 Resultado</button>
            </div>
            <div class="subcontrols" style="margin-top: 15px;">
                <button onclick="todo()" class="button-3d" id="generateButton">🎲 Generar</button>
                <button onclick="terminarJuego()" class="button-3d" style="background-color: #FF2977; color: white;">Terminar</button>
            </div>
        </div>
        <!-- Settings Overlay + Panel -->
        <div id="settingsOverlay" style="display: none;"></div>
        <div id="settingsPanel" style="display: none;">
            <button onclick="cancelSettings()" class="close-btn">&#x2715;</button>
            <div class="title">
                <span>Ajustes</span>
            </div>
            <label for="maxValue">Valor Máximo:</label>
            <input type="number" id="maxValue" value="15">
            <br>
            <label for="delay">Delay (segundos):</label>
            <input type="number" id="delay" value="0.5" step="0.1">
            <br>
            <label for="numCount">Número de cifras:</label>
            <input type="number" id="numCount" value="4">
            <br>
            <input type="checkbox" id="increaseSpeed">
            <label for="increaseSpeed">➕ velocidad</label>
            <br>
            <input type="checkbox" id="increaseSequence">
            <label for="increaseSequence">➕ no. de cifras</label>
            <br><br>
            <div style="text-align: center;">
                <button onclick="applySettings()" class="button-3d" style="width: auto; padding: 10px 40px;">OK</button>
            </div>
        </div>

        <!-- High Score Modal -->
        <div id="highScoreOverlay"></div>
        <div id="highScorePanel">
            <button onclick="cancelHighScore()" class="close-btn">&#x2715;</button>
            <div class="title" style="text-align:center; font-weight:bold; font-size:22px; margin-bottom: 20px;">¡Nuevo Récord!</div>
            <div style="font-size: 16px; margin-bottom: 10px;">Ingresa tu nombre:</div>
            <input type="text" id="initialsInput" class="name-input" maxlength="15" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none" placeholder="Tu nombre...">
            <button onclick="submitHighScore()" class="button-3d" style="width: auto; padding: 10px 40px; margin-top: 10px;">Guardar</button>
        </div>

        <!-- Leaderboard Modal -->
        <div id="leaderboardOverlay"></div>
        <div id="leaderboardPanel">
            <button onclick="hideLeaderboard()" class="close-btn">&#x2715;</button>
            <div class="title" style="text-align:center; font-weight:bold; font-size:22px; margin-bottom: 20px;">Mejores Puntuaciones</div>
            <div id="leaderboardContent">Cargando...</div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>

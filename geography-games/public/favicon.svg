<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Base Globe (Oceans) -->
  <circle cx="50" cy="50" r="45" fill="#4ea8de" stroke="#111827" stroke-width="4" />
  
  <!-- Continents/Landmasses (Green) -->
  <path d="M 25 35 Q 35 20 45 30 T 40 45 Q 30 55 25 35 Z" fill="#2a9d8f" stroke="#111827" stroke-width="2"/>
  <path d="M 60 25 Q 80 20 85 40 T 70 65 Q 55 50 60 25 Z" fill="#2a9d8f" stroke="#111827" stroke-width="2"/>
  <path d="M 35 60 Q 50 80 40 90 T 25 75 Q 25 55 35 60 Z" fill="#2a9d8f" stroke="#111827" stroke-width="2"/>
  <path d="M 65 70 Q 80 85 75 90 T 55 85 Q 60 75 65 70 Z" fill="#2a9d8f" stroke="#111827" stroke-width="2"/>
  
  <!-- Latitude and Longitude lines (optional, to make it look more like a globe) -->
  <path d="M 5 50 Q 50 30 95 50" fill="none" stroke="#000000" stroke-width="2" stroke-opacity="0.3"/>
  <path d="M 5 50 Q 50 70 95 50" fill="none" stroke="#000000" stroke-width="2" stroke-opacity="0.3"/>
  <path d="M 50 5 Q 30 50 50 95" fill="none" stroke="#000000" stroke-width="2" stroke-opacity="0.3"/>
  <path d="M 50 5 Q 70 50 50 95" fill="none" stroke="#000000" stroke-width="2" stroke-opacity="0.3"/>
</svg>